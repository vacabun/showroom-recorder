name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build and publish package
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import importlib.util
          import os
          from pathlib import Path

          version_path = Path("src/showroom_recorder/version.py")
          spec = importlib.util.spec_from_file_location("package_version", version_path)
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)

          package_version = module.__version__
          tag_name = os.environ["GITHUB_REF_NAME"]
          expected_tag = f"v{package_version}"

          if tag_name != expected_tag:
              raise SystemExit(
                  f"Refusing to publish: git tag {tag_name!r} does not match package version {expected_tag!r}."
              )

          print(f"Publishing version {package_version} from tag {tag_name}.")
          PY

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build distributions
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
